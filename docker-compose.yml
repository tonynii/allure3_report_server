services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: allure
      POSTGRES_PASSWORD: allure
      POSTGRES_DB: allure3
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U allure -d allure3"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    env_file: ./backend/.env.docker
    volumes:
      - allure_data:/data/allure
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    volumes:
      - allure_data:/data/allure:ro
    depends_on:
      - backend

volumes:
  pgdata:
  allure_data:
